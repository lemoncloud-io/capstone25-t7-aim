#-----------------------------------
# Dummmy Environment Variables.
#-----------------------------------
# default
default_env: &default_env
  LS: 0                   # log silence.
  LC: 1                   # line-coloring
  TS: 1                   # time-stamp in line
  NAME: ''                # profile name (should be empty for this `none` env)

#-----------------------------------
# local development configuration.
local:
  <<: *default_env
  STAGE: 'local'

#-----------------------------------
# development server
dev:
  <<: *default_env
  STAGE: 'develop'

#-----------------------------------
# production with AWS deploy
prod:
  <<: *default_env
  STAGE: 'production'
  NS: SS
  TS: 0

